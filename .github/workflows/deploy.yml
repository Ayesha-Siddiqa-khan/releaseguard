# ============================================================
# ReleaseGuard - Deploy to Kubernetes
# ============================================================
# This workflow builds Docker images, pushes them to AWS ECR,
# and deploys them to a Kubernetes cluster using kubeconfig.
#
# Trigger: Push to main branch
#
# What it does:
#   1. Builds backend and frontend Docker images
#   2. Tags and pushes both images to the SAME ECR repository
#      using commit SHA tags (backend-<sha>, frontend-<sha>)
#   3. Decodes KUBE_CONFIG_B64 into ~/.kube/config
#   4. Runs kubectl to update the deployments
#   5. Waits for pods to be ready
# ============================================================

name: Deploy

on:
  push:
    branches: [main]

# Required for GitHub OIDC (AWS authentication without secrets)
permissions:
  id-token: write
  contents: read

env:
  # AWS / ECR settings (set these as GitHub Variables)
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'infra-dev/backend-api' }}

  # Kubernetes settings (set these as GitHub Variables)
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'releaseguard' }}
  BACKEND_DEPLOYMENT: ${{ vars.BACKEND_DEPLOYMENT || 'releaseguard-backend' }}
  FRONTEND_DEPLOYMENT: ${{ vars.FRONTEND_DEPLOYMENT || 'releaseguard-frontend' }}
  BACKEND_CONTAINER: ${{ vars.BACKEND_CONTAINER || 'backend' }}
  FRONTEND_CONTAINER: ${{ vars.FRONTEND_CONTAINER || 'frontend' }}

jobs:
  # ==========================================================
  # JOB 1: Build Docker images and push to ECR
  # ==========================================================
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- AWS Authentication via OIDC (no static keys!) ---
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # --- Login to ECR (returns the registry URL) ---
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # --- Build and push BACKEND image ---
      # Tag: backend-<commit-sha> (immutable, unique per commit)
      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Building backend image..."
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:backend-$IMAGE_TAG ./backend

          echo "Pushing backend image..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:backend-$IMAGE_TAG

      # --- Build and push FRONTEND image ---
      # Tag: frontend-<commit-sha> (immutable, unique per commit)
      - name: Build and push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Building frontend image..."
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:frontend-$IMAGE_TAG ./frontend

          echo "Pushing frontend image..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:frontend-$IMAGE_TAG

      # --- Print what was pushed (for debugging) ---
      - name: Show pushed image tags
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "=========================================="
          echo "Pushed images (immutable SHA tags):"
          echo "  Backend:  $ECR_REGISTRY/$ECR_REPOSITORY:backend-$IMAGE_TAG"
          echo "  Frontend: $ECR_REGISTRY/$ECR_REPOSITORY:frontend-$IMAGE_TAG"
          echo "=========================================="

  # ==========================================================
  # JOB 2: Deploy to Kubernetes via kubeconfig
  # ==========================================================
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # --- Re-authenticate to AWS (needed for ECR login in this job) ---
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # --- Decode kubeconfig from base64 secret ---
      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      # --- Verify cluster access ---
      - name: Verify cluster access
        run: |
          echo "=========================================="
          echo "Cluster nodes:"
          echo "=========================================="
          kubectl get nodes

          echo ""
          echo "=========================================="
          echo "Deployments in namespace: $K8S_NAMESPACE"
          echo "=========================================="
          kubectl get deploy -n $K8S_NAMESPACE

      # --- Update BACKEND deployment image ---
      - name: Deploy backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          FULL_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:backend-$IMAGE_TAG"
          echo "Deploying backend: $FULL_IMAGE"

          kubectl set image deployment/$BACKEND_DEPLOYMENT \
            $BACKEND_CONTAINER=$FULL_IMAGE \
            -n $K8S_NAMESPACE

      # --- Update FRONTEND deployment image ---
      - name: Deploy frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          FULL_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:frontend-$IMAGE_TAG"
          echo "Deploying frontend: $FULL_IMAGE"

          kubectl set image deployment/$FRONTEND_DEPLOYMENT \
            $FRONTEND_CONTAINER=$FULL_IMAGE \
            -n $K8S_NAMESPACE

      # --- Wait for backend rollout to complete ---
      - name: Wait for backend rollout
        run: |
          echo "Waiting for backend rollout..."
          kubectl rollout status deployment/$BACKEND_DEPLOYMENT \
            -n $K8S_NAMESPACE \
            --timeout=300s

      # --- Wait for frontend rollout to complete ---
      - name: Wait for frontend rollout
        run: |
          echo "Waiting for frontend rollout..."
          kubectl rollout status deployment/$FRONTEND_DEPLOYMENT \
            -n $K8S_NAMESPACE \
            --timeout=300s

      # --- Show all pods and services (for verification) ---
      - name: Show pods and services
        run: |
          echo "=========================================="
          echo "Pods in namespace: $K8S_NAMESPACE"
          echo "=========================================="
          kubectl get pods -n $K8S_NAMESPACE -o wide

          echo ""
          echo "=========================================="
          echo "Services in namespace: $K8S_NAMESPACE"
          echo "=========================================="
          kubectl get svc -n $K8S_NAMESPACE

      # --- Record deployment metadata (optional) ---
      # Only runs if API_URL variable is set in GitHub
      - name: Record deployment metadata
        if: vars.API_URL != ''
        run: |
          echo "Recording deployment metadata..."
          curl -s -X POST "${{ vars.API_URL }}/api/deployments" \
            -H "Content-Type: application/json" \
            -d '{
              "app_name": "releaseguard",
              "environment": "production",
              "status": "success",
              "commit_sha": "${{ github.sha }}",
              "branch": "main",
              "github_run_id": "${{ github.run_id }}",
              "triggered_by": "github-actions",
              "release_note": "Automated deployment to Kubernetes"
            }' || echo "Could not record metadata (API_URL not set or unreachable)"

      # --- Always clean up kubeconfig, even if deployment fails ---
      - name: Cleanup kubeconfig
        if: always()
        run: rm -f ~/.kube/config
